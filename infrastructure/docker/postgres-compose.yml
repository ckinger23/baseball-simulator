services:
  postgres:
    image: postgres:16
    container_name: baseball-sim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: baseball_sim
      POSTGRES_USER: baseball
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baseball_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseball -d baseball_sim"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
